<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>IndicaMed</title>
  <link rel="stylesheet" href="styles.css?v=5.0" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <div class="brand">IndicaMed</div>
        <div class="subtitle">Indicaciones médicas desde cualquier lugar</div>
      </div>
      <button id="installBtn" class="ghost hidden">Instalar</button>
    </header>

    <main>
      <section id="onboarding" class="card panel">
        <h1>Configura tu perfil médico</h1>
        <p class="muted">Estos datos aparecerán en las órdenes emitidas.</p>
        <form id="doctorForm" class="form-grid">
          <label>Nombre completo<input id="doctorName" required placeholder="Ej. Jerónimo Troncoso Acuña" /></label>
          <label>Especialidad<input id="doctorSpecialty" required placeholder="Ej. Pediatría" /></label>
          <label>RUT<input id="doctorRut" required placeholder="17.458.750-7" /></label>
          <label>Registro profesional<input id="doctorRegistry" placeholder="N.º de registro" /></label>
          <label>Centro o consulta<input id="doctorCenter" placeholder="Opcional" /></label>
          <label>Correo<input id="doctorEmail" type="email" required placeholder="correo@ejemplo.cl" /></label>
          <label>Teléfono<input id="doctorPhone" type="tel" placeholder="+56 9 1234 5678" /></label>
          <label>Dirección de consulta<input id="doctorAddress" placeholder="Opcional" /></label>
          <label class="full">Logo de la consulta (opcional)<input id="doctorLogo" type="file" accept="image/png,image/jpeg,image/webp" /></label>
          <div id="logoPreviewWrap" class="full hidden"><img id="logoPreview" alt="Vista previa del logo" style="max-height:80px;max-width:220px;object-fit:contain;border:1px solid #d8e0e8;border-radius:12px;padding:8px;background:white"></div>
          <label class="full">Firma (nombre o rúbrica)<input id="doctorSignature" required placeholder="Escribe cómo deseas que aparezca la firma" /></label>
          <button class="primary full" type="submit">Guardar y continuar</button>
        </form>
      </section>

      <section id="workspace" class="hidden">
        <nav class="tabs card">
          <button class="tab active" data-view="newOrder">Nueva orden</button>
          <button class="tab" data-view="history">Historial</button>
          <button class="tab" data-view="settings">Perfil</button>
        </nav>

        <section id="newOrder" class="view card panel">
          <h2>Nueva indicación</h2>
          <form id="orderForm">
            <div class="form-grid">
              <label>Nombre del paciente<input id="patientName" required /></label>
              <label>RUT<input id="patientRut" placeholder="Opcional" /></label>
              <label>Edad<input id="patientAge" placeholder="Ej. 3 meses" /></label>
              <label>Fecha de nacimiento<input id="patientDob" type="date" /></label>
              <label class="full">Dirección<input id="patientAddress" placeholder="Opcional" /></label>
            </div>

            <div class="quick-box">
              <label>Escribe o dicta la indicación</label>
              <textarea id="smartInput" rows="3" placeholder="Ej. Radiografía de pelvis AP y Lowenstein. Descartar displasia de cadera."></textarea>
              <button type="button" id="parseBtn" class="secondary">Ordenar texto</button>
            </div>

            <label>Exámenes o procedimientos solicitados</label>
            <div id="itemsList" class="items-list"></div>
            <button type="button" id="addItemBtn" class="ghost wide">+ Agregar examen o procedimiento</button>

            <label>Observación clínica<textarea id="clinicalNote" rows="3" placeholder="Ej. Descartar displasia de cadera"></textarea></label>
            <label>Preparación o indicaciones adicionales<textarea id="preparation" rows="3" placeholder="Ej. Ayuno de 8 horas, asistir con orden anterior, etc."></textarea></label>

            <div class="actions">
              <button type="button" id="previewBtn" class="secondary">Vista previa</button>
              <button type="submit" class="primary">Emitir orden</button>
            </div>
          </form>
        </section>

        <section id="history" class="view card panel hidden">
          <div class="section-head"><h2>Historial</h2><button id="clearHistory" class="danger-link">Borrar historial</button></div>
          <div id="historyList" class="history-list"></div>
        </section>

        <section id="settings" class="view card panel hidden">
          <h2>Perfil médico</h2>
          <div id="profileSummary"></div>
          <button id="editProfileBtn" class="secondary wide">Editar perfil</button>
        </section>
      </section>
    </main>
  </div>

  <dialog id="previewDialog">
    <div class="dialog-head">
      <strong>Vista previa de la orden</strong>
      <button id="closePreview" class="icon-btn">×</button>
    </div>
    <div id="printArea" class="order-sheet"></div>
    <div class="dialog-actions">
      <button id="printBtn" class="primary">Guardar como PDF / Imprimir</button>
    </div>
  </dialog>

  <template id="itemTemplate">
    <div class="item-row">
      <input class="order-item" placeholder="Ej. Radiografía de pelvis AP" required />
      <button type="button" class="remove-item" aria-label="Eliminar">×</button>
    </div>
  </template>

  <script src="app.js?v=5.0"></script>
</body>
</html>
